# ============================================================================
# TEKER MARKET — docker-compose.yml
# MySQL 8.0 + Next.js 15
# Kullanım: docker-compose up --build
# ============================================================================

version: '3.9'

services:

  # ── MySQL 8.0 Veritabanı ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: teker-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-teker_market}
      MYSQL_USER:          ${MYSQL_USER:-teker}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-teker123}
    ports:
      - "3306:3306"
    volumes:
      # Şema ve seed data — ilk başlatmada otomatik çalışır
      - ./mysql_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      # Veri kalıcılığı
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "teker", "-pteker123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Next.js Uygulaması ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teker-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      # MySQL bağlantı bilgileri (docker network içi hostname)
      MYSQL_HOST:     mysql
      MYSQL_PORT:     "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-teker_market}
      MYSQL_USER:     ${MYSQL_USER:-teker}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-teker123}
      NODE_ENV:       production
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mysql_data:
    driver: local

networks:
  default:
    name: teker-network
